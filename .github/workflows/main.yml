name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node 22
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3️⃣ Install deps
      - name: Install dependencies
        run: npm install

      # 4️⃣ Build web (with fallback)
      - name: Build web assets
        run: |
          npm run build || echo "No build script"
          if [ ! -d "dist" ]; then
            echo "dist not found → creating fallback"
            mkdir dist
            echo "<html><body>App</body></html>" > dist/index.html
          fi

      # 5️⃣ Setup Java (17 recommended)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 6️⃣ Add Android if missing
      - name: Generate Android folder if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      # 7️⃣ Sync Capacitor
      - name: Sync Capacitor
        run: npx cap sync android

      # 8️⃣ Build Debug APK
      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 9️⃣ Upload Debug APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
